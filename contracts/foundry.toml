[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
verbosity = 3


# Fuzz testing configuration
[fuzz]
runs = 256

# RPC endpoints
[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
ethereum_sepolia = "${ETHEREUM_SEPOLIA_RPC}"

# Etherscan API keys for contract verification
[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# Formatter
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
